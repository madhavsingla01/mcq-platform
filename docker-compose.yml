version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mcq-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mcq-platform
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mcq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
